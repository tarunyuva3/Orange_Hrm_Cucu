## Enable parallel execution for the JUnit 5 Engine Platform
#junit.jupiter.execution.parallel.enabled=true
#
## Allow Cucumber to execute individual feature scenarios concurrently inside the same runner suite
#cucumber.execution.parallel.enabled=true
#
## Choose a fixed thread allocation strategy for explicit control over execution threads
#junit.jupiter.execution.parallel.config.strategy=fixed
#
## Define the max number of parallel browser instances/threads to run simultaneously
#junit.jupiter.execution.parallel.config.fixed.parallelism=4